name: Weekly Design Catchup

on:
  # JST 12:00 毎週金曜日に実行（UTCでは -9時間）
  schedule:
    - cron: '0 3 * * 5'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to analyze'
        required: false
        type: number
        default: 7

jobs:
  weekly-report:
    # nestjs-commit-recap リポジトリの再利用可能なワークフローを呼び出し
    uses: Everforth/nestjs-commit-recap/.github/workflows/design-catchup-reusable.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      days: ${{ github.event.inputs.days || 7 }}
      issue_labels: 'design-review,weekly-report,automated'
